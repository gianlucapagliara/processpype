site_name: ProcessPype
site_url: https://gianlucapagliara.github.io/processpype/
site_description: A modular application framework with FastAPI integration for building service-oriented Python applications
site_author: Gianluca Pagliara
repo_url: https://github.com/gianlucapagliara/processpype
repo_name: gianlucapagliara/processpype

theme:
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - python
    - bash
    - yaml

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - codehilite:
      guess_lang: false
  - def_list
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - User Guide:
      - Application: guide/application.md
      - Services: guide/services.md
      - Configuration: guide/configuration.md
      - Routing: guide/routing.md
      - Docker: guide/docker.md
  - API Reference:
      - Application: api/application.md
      - BaseService: api/service.md
      - ServiceManager: api/service-manager.md
      - Models: api/models.md
      - Configuration: api/configuration.md
      - Router: api/router.md
  - Development:
      - Contributing: development/contributing.md
